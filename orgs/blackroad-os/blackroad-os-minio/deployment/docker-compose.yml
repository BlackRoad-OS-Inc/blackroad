version: '3.8'

services:
  minio:
    image: minio_IMAGE
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - NODE_ENV=production

  blackroad-ui:
    build: ../ui
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://minio:8080

  blackroad-api:
    build: ../api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/blackroad
