<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackRoad Store - AI Tools, Merch & More</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #000000;
            --bg-secondary: #0f0f0f;
            --bg-tertiary: #1a1a1a;
            --text: #ffffff;
            --text-muted: #888888;
            --accent-orange: #FF9D00;
            --accent-pink: #FF0066;
            --accent-purple: #7700FF;
            --accent-blue: #0066FF;
            --border: rgba(255, 255, 255, 0.1);
            --success: #00ff00;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-pink), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .cart-button {
            position: relative;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }

        .cart-button:hover {
            border-color: var(--accent-purple);
        }

        .cart-count {
            background: var(--accent-pink);
            color: #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .hero {
            padding: 4rem 2rem;
            text-align: center;
            background: linear-gradient(180deg, var(--bg) 0%, var(--bg-secondary) 100%);
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-pink), var(--accent-purple), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .categories {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .category-btn {
            padding: 0.75rem 1.5rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-btn:hover, .category-btn.active {
            background: var(--accent-purple);
            color: #fff;
            border-color: var(--accent-purple);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .product-card:hover {
            border-color: var(--accent-purple);
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(119, 0, 255, 0.3);
        }

        .product-image {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-category {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .product-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .product-description {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .add-to-cart {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .add-to-cart:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(119, 0, 255, 0.5);
        }

        .badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--accent-orange);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            z-index: 1000;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h3 {
            font-size: 1.5rem;
        }

        .close-cart {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }

        .cart-item-image {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .cart-item-price {
            color: var(--text-muted);
        }

        .cart-item-remove {
            background: none;
            border: none;
            color: var(--accent-pink);
            cursor: pointer;
            padding: 0.5rem;
        }

        .cart-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .checkout-button {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-pink));
            border: none;
            padding: 1.25rem;
            border-radius: 8px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .checkout-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 0, 102, 0.5);
        }

        .empty-cart {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .cart-sidebar {
                width: 100%;
                right: -100%;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🛍️ BlackRoad Store</div>
        <button class="cart-button" onclick="toggleCart()">
            <span>🛒 Cart</span>
            <span class="cart-count" id="cartCount">0</span>
        </button>
    </div>

    <div class="hero">
        <h1>Premium AI Tools & Merch</h1>
        <p>Everything you need to build with BlackRoad OS</p>
    </div>

    <div class="container">
        <div class="categories">
            <button class="category-btn active" onclick="filterCategory('all')">All Products</button>
            <button class="category-btn" onclick="filterCategory('software')">Software</button>
            <button class="category-btn" onclick="filterCategory('templates')">Templates</button>
            <button class="category-btn" onclick="filterCategory('merch')">Merchandise</button>
            <button class="category-btn" onclick="filterCategory('courses')">Courses</button>
        </div>

        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="close-cart" onclick="toggleCart()">×</button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="empty-cart">
                <p>Your cart is empty</p>
                <p style="font-size: 3rem; margin: 1rem 0;">🛒</p>
            </div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="checkout-button" onclick="checkout()">Proceed to Checkout</button>
        </div>
    </div>

    <script>
        // Product data
        const products = [
            {
                id: 1,
                category: 'software',
                name: 'Lucidia QI Pro',
                description: 'Advanced AI agent framework with quantum capabilities',
                price: 299,
                emoji: '🤖',
                badge: 'Popular'
            },
            {
                id: 2,
                category: 'software',
                name: 'Quantum Simulator',
                description: 'Professional quantum circuit simulator with GPU acceleration',
                price: 199,
                emoji: '⚛️'
            },
            {
                id: 3,
                category: 'templates',
                name: 'AI Dashboard Template',
                description: 'Complete admin dashboard with AI integration',
                price: 99,
                emoji: '📊'
            },
            {
                id: 4,
                category: 'templates',
                name: 'Landing Page Kit',
                description: '20 customizable landing pages for AI products',
                price: 79,
                emoji: '🎨',
                badge: 'New'
            },
            {
                id: 5,
                category: 'merch',
                name: 'BlackRoad Hoodie',
                description: 'Premium hoodie with gradient logo',
                price: 59,
                emoji: '👕'
            },
            {
                id: 6,
                category: 'merch',
                name: 'Quantum Computing Mug',
                description: 'Temperature-activated circuit design',
                price: 24,
                emoji: '☕'
            },
            {
                id: 7,
                category: 'courses',
                name: 'AI Engineering Masterclass',
                description: '12-week comprehensive course on AI systems',
                price: 599,
                emoji: '🎓',
                badge: 'Best Seller'
            },
            {
                id: 8,
                category: 'courses',
                name: 'Quantum Computing 101',
                description: 'Beginner-friendly quantum computing fundamentals',
                price: 299,
                emoji: '📚'
            },
            {
                id: 9,
                category: 'software',
                name: 'Deployment Toolkit',
                description: 'Automated deployment tools for 1000+ sites',
                price: 149,
                emoji: '🚀'
            },
            {
                id: 10,
                category: 'templates',
                name: 'SaaS Starter Kit',
                description: 'Complete SaaS application with Stripe integration',
                price: 249,
                emoji: '💼'
            },
            {
                id: 11,
                category: 'merch',
                name: 'Laptop Sticker Pack',
                description: '25 premium vinyl stickers',
                price: 19,
                emoji: '🎁'
            },
            {
                id: 12,
                category: 'software',
                name: 'API Analytics Suite',
                description: 'Real-time API monitoring and analytics',
                price: 179,
                emoji: '📈'
            }
        ];

        let cart = [];
        let stripe;

        // Initialize Stripe
        if (window.Stripe) {
            stripe = Stripe('pk_test_51QYourTestKeyHere'); // Replace with actual key
        }

        // Render products
        function renderProducts(filter = 'all') {
            const grid = document.getElementById('productsGrid');
            const filteredProducts = filter === 'all' ? products : products.filter(p => p.category === filter);

            grid.innerHTML = filteredProducts.map(product => `
                <div class="product-card" data-category="${product.category}">
                    <div class="product-image" style="position: relative;">
                        ${product.badge ? `<div class="badge">${product.badge}</div>` : ''}
                        ${product.emoji}
                    </div>
                    <div class="product-info">
                        <div class="product-category">${product.category}</div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-description">${product.description}</div>
                        <div class="product-footer">
                            <div class="product-price">$${product.price}</div>
                            <button class="add-to-cart" onclick="addToCart(${product.id})">Add to Cart</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Filter by category
        function filterCategory(category) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts(category);
        }

        // Add to cart
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            updateCart();
            showNotification(`${product.name} added to cart!`);
        }

        // Remove from cart
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
        }

        // Update cart UI
        function updateCart() {
            const cartItems = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const cartTotal = document.getElementById('cartTotal');

            cartCount.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);

            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="empty-cart">
                        <p>Your cart is empty</p>
                        <p style="font-size: 3rem; margin: 1rem 0;">🛒</p>
                    </div>
                `;
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-image">${item.emoji}</div>
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">$${item.price} × ${item.quantity}</div>
                        </div>
                        <button class="cart-item-remove" onclick="removeFromCart(${item.id})">🗑️</button>
                    </div>
                `).join('');
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotal.textContent = `$${total.toFixed(2)}`;
        }

        // Toggle cart sidebar
        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
        }

        // Checkout with Stripe
        async function checkout() {
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }

            const items = cart.map(item => ({
                price_data: {
                    currency: 'usd',
                    product_data: {
                        name: item.name,
                        description: item.description
                    },
                    unit_amount: item.price * 100 // Stripe uses cents
                },
                quantity: item.quantity
            }));

            // In production, create a Checkout Session on your server
            // Then redirect to Stripe Checkout
            console.log('Creating Stripe Checkout session with items:', items);

            // Demo mode
            alert(`Demo Mode: Checkout with ${cart.length} items\n\nTotal: $${cart.reduce((sum, item) => sum + (item.price * item.quantity), 0).toFixed(2)}\n\nIn production, this would redirect to Stripe Checkout.`);

            // Simulate successful purchase
            if (confirm('Simulate successful purchase?')) {
                cart = [];
                updateCart();
                toggleCart();
                showNotification('Purchase successful! Thank you for your order! 🎉');
            }
        }

        // Notification
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 2rem;
                right: 2rem;
                background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
                padding: 1rem 2rem;
                border-radius: 8px;
                color: #fff;
                font-weight: 600;
                z-index: 10000;
                animation: slideIn 0.3s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Initialize
        renderProducts();
    </script>

    <style>
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }
    </style>
</body>
</html>
