version: '3.8'

# BlackRoad 19 Domains - Docker Compose Configuration
# Deployed on: lucidia (192.168.4.38)
# Management: docker-compose up -d

services:
  blackboxprogramming-io:
    image: blackboxprogramming.io:latest
    container_name: blackboxprogramming.io
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - blackroad-network

  blackroad-company:
