name = "roadgateway"
main = "src/index.js"
compatibility_date = "2024-12-01"
account_id = "848cf0b18d51e0170e0d1537aec3505a"

routes = [
  { pattern = "pay.blackroad.io/*", zone_name = "blackroad.io" }
]

[vars]
ENVIRONMENT = "production"
SUCCESS_URL = "https://blackroad.io/welcome"
CANCEL_URL = "https://store.blackroad.io"

# Secrets (set via `wrangler secret put`):
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# STRIPE_PRICE_PRO_MONTHLY
# STRIPE_PRICE_PRO_YEARLY
# STRIPE_PRICE_ENT_MONTHLY
# STRIPE_PRICE_ENT_YEARLY
# PI_WEBHOOK_URL          (e.g. http://192.168.4.64:8445)
# PI_WEBHOOK_SECRET
