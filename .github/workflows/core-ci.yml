name: CORE CI

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: [self-hosted, blackroad-fleet]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (Prettier)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
