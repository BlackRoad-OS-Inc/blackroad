name: Auto Label

on:
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  label:
    runs-on: [self-hosted, blackroad-fleet]
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const name = context.repo.repo.toLowerCase()
            const labelName = name.includes("lab") ? "labs" : "core"

            // Ensure label exists before applying
            try {
              await github.rest.issues.getLabel({
                ...context.repo,
                name: labelName
              })
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  ...context.repo,
                  name: labelName,
                  color: labelName === 'labs' ? 'a2eeef' : '0075ca',
                  description: `Auto-label: ${labelName}`
                })
              } else {
                core.warning(`Failed to check label: ${e.message}`)
                return
              }
            }

            try {
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: context.issue.number,
                labels: [labelName]
              })
            } catch (e) {
              core.warning(`Failed to add label: ${e.message}`)
            }
